# yaml-language-server: $schema=./sanity-constraints.schema.json
version: 1
constraints:
  - id: quality-unique-person-ids
    name: Unique person IDs
    category: Data Quality
    description: Each person should have a unique person_id
    query_keys:
      - personIdDuplicates

  - id: quality-no-null-person-ids
    name: No NULL person IDs
    category: Data Quality
    description: All representatives must have a person_id
    query_keys:
      - representativeNullPersonId

  - id: quality-complete-names
    name: Complete names
    category: Data Quality
    description: All representatives must have first and last names
    query_keys:
      - representativeMissingNames

  - id: integrity-session-keys-present
    name: Session keys present
    category: Data Integrity
    description: All sessions must have a non-empty key
    query_keys:
      - sessionEmptyKeys

  - id: integrity-session-dates-present
    name: Session dates present
    category: Data Integrity
    description: All sessions must have a date
    query_keys:
      - sessionEmptyDates

  - id: integrity-unique-session-keys
    name: Unique session keys
    category: Data Integrity
    description: Session keys must be unique
    query_keys:
      - sessionTotalCount
      - sessionUniqueKeyCount

  - id: ref-section-session-links
    name: Section → Session links
    category: Referential Integrity
    description: All sections must reference existing sessions
    query_keys:
      - sectionSessionOrphans

  - id: logic-parliament-size-limit
    name: Parliament size limit
    category: Business Logic
    description: Active MPs should never exceed 200 on any date
    query_keys:
      - parliamentOversizedDates
    params:
      max_members: 200

  - id: logic-voting-total-200
    name: Voting total ≤200
    category: Business Logic
    description: Vote totals should never exceed 200
    query_keys:
      - votingTotalOver200
    params:
      max_total: 200

  - id: integrity-voting-count-sums
    name: Voting count sums
    category: Data Integrity
    description: Vote counts must sum to n_total
    query_keys:
      - votingSumMismatch

  - id: integrity-individual-vote-count-matches
    name: Individual vote count matches
    category: Data Integrity
    description: Individual vote records must match n_total
    query_keys:
      - votingIndividualCountMismatch

  - id: integrity-unique-voting-numbers
    name: Unique voting numbers
    category: Data Integrity
    description: Voting numbers must be unique within sessions
    query_keys:
      - votingDuplicateNumbers

  - id: ref-voting-session-links
    name: Voting → Session links
    category: Referential Integrity
    description: All votings must reference existing sessions
    query_keys:
      - votingSessionOrphans

  - id: quality-valid-vote-values
    name: Valid vote values
    category: Data Quality
    description: "Vote values must be Jaa, Ei, Tyhjää, or Poissa"
    query_keys:
      - voteInvalidValues

  - id: quality-no-duplicate-votes
    name: No duplicate votes
    category: Data Quality
    description: Each person can only vote once per voting
    query_keys:
      - voteDuplicateByPerson

  - id: quality-valid-gender-values
    name: Valid gender values
    category: Data Quality
    description: "Gender must be 'Mies' or 'Nainen'"
    query_keys:
      - representativeInvalidGender

  - id: integrity-representatives-have-terms
    name: Representatives have terms
    category: Data Integrity
    description: All representatives must have at least one term
    query_keys:
      - representativeWithoutTerms

  - id: integrity-term-dates-valid
    name: Term dates valid
    category: Data Integrity
    description: Term start_date must be ≤ end_date
    query_keys:
      - termInvalidDates

  - id: integrity-group-membership-dates-valid
    name: Group membership dates valid
    category: Data Integrity
    description: Membership start_date must be ≤ end_date
    query_keys:
      - groupMembershipInvalidDates

  - id: ref-speech-session-links
    name: Speech → Session links
    category: Referential Integrity
    description: All speeches must reference existing sessions
    query_keys:
      - speechSessionOrphans

  - id: ref-speechcontent-speech-links
    name: SpeechContent → Speech links
    category: Speech Content Mapping
    description: All speech content rows must map to existing Speech metadata rows
    query_keys:
      - speechContentSpeechOrphans

  - id: mapping-speech-metadata-content
    name: "Speech metadata/content mismatches are exactly has_spoken=0"
    category: Speech Content Mapping
    description: "Rows without linked SpeechContent are allowed only when Speech.has_spoken = 0, and has_spoken = 0 rows should not have SpeechContent"
    query_keys:
      - speechMetadataWithoutContent
      - speechMetadataWithoutContentUnexpected
      - speechHasSpokenZeroWithContent

  - id: mapping-speechcontent-name-match
    name: SpeechContent speaker names match Speech metadata
    category: Speech Content Mapping
    description: Linked SpeechContent rows should have matching first_name and last_name with Speech
    query_keys:
      - speechContentNameComparedCount
      - speechContentNameMismatches

  - id: ref-vote-representative-links
    name: Vote → Representative links
    category: Referential Integrity
    description: All votes must reference existing representatives
    query_keys:
      - voteRepresentativeOrphans

  - id: schema-performance-indexes
    name: Performance indexes present
    category: Schema
    description: Critical performance indexes must exist
    query_keys:
      - schemaIndexes
    query_refs:
      - EXPECTED_SANITY_INDEXES

  - id: integrity-vote-aggregation-per-type
    name: Vote aggregation per type
    category: Data Integrity
    description: Per-type vote counts must match individual vote records
    query_keys:
      - voteAggregationMismatch

  - id: logic-voting-date-close-to-session
    name: Voting date within 1 day of session date
    category: Business Logic
    description: Voting start_time should be within 1 day of session date (sessions can span overnight)
    query_keys:
      - votingSessionDateMismatch

  - id: ref-voting-section-links
    name: Voting → Section links
    category: Referential Integrity
    description: Votings with section_key must reference existing sections
    query_keys:
      - votingSectionOrphans

  - id: integrity-committee-membership-dates
    name: Committee membership dates valid
    category: Data Integrity
    description: Committee membership start_date must be ≤ end_date
    query_keys:
      - committeeMembershipInvalidDates

  - id: integrity-government-membership-dates
    name: Government membership dates valid
    category: Data Integrity
    description: Government membership start_date must be ≤ end_date
    query_keys:
      - governmentMembershipInvalidDates

  - id: quality-government-name-present
    name: Government name present
    category: Data Quality
    description: All government memberships must have a government name
    query_keys:
      - governmentMembershipEmptyGovernment

  - id: logic-district-count-plausible
    name: District count plausible
    category: Business Logic
    description: Finland has 13 current + historical electoral districts (expect 10-50)
    query_keys:
      - districtCount

  - id: integrity-no-overlapping-districts
    name: No overlapping district assignments
    category: Data Integrity
    description: Same representative should not have overlapping district assignments
    query_keys:
      - representativeDistrictOverlaps

  - id: ref-education-representative-links
    name: Education → Representative links
    category: Referential Integrity
    description: All education records must reference existing representatives
    query_refs:
      - getAuxiliaryRepresentativeOrphanQuery(Education)

  - id: ref-workhistory-representative-links
    name: WorkHistory → Representative links
    category: Referential Integrity
    description: All workhistory records must reference existing representatives
    query_refs:
      - getAuxiliaryRepresentativeOrphanQuery(WorkHistory)

  - id: ref-trustposition-representative-links
    name: TrustPosition → Representative links
    category: Referential Integrity
    description: All trustposition records must reference existing representatives
    query_refs:
      - getAuxiliaryRepresentativeOrphanQuery(TrustPosition)

  - id: logic-session-dates-after-1907
    name: Session dates after 1907
    category: Business Logic
    description: "Finnish parliament founded in 1907, no earlier sessions"
    query_keys:
      - sessionTooOld
    params:
      min_year: 1907

  - id: logic-no-future-session-dates
    name: No future session dates
    category: Business Logic
    description: Session dates should not be in the future
    query_keys:
      - sessionInFuture

  - id: logic-active-mps-have-group
    name: Active MPs have group membership
    category: Business Logic
    description: Every active MP should belong to a parliamentary group
    query_keys:
      - activeMpWithoutGroup

  - id: logic-group-member-count-matches-active
    name: Group member count matches active MPs
    category: Business Logic
    description: Active group members count should equal active parliament members count per date
    query_keys:
      - activeGroupMemberMismatch

  - id: salidb-sectiondocumentlink-section
    name: "SectionDocumentLink -> Section"
    category: SaliDB Linkage
    description: All section document links should reference an existing section
    query_refs:
      - "SALIDB_LINKAGE_CHECKS[0]"

  - id: salidb-sessionnotice-session
    name: "SessionNotice -> Session"
    category: SaliDB Linkage
    description: All session notices should reference an existing session
    query_refs:
      - "SALIDB_LINKAGE_CHECKS[1]"

  - id: salidb-sessionnotice-section
    name: "SessionNotice.section_key -> Section"
    category: SaliDB Linkage
    description: Session notices with a section key should reference an existing section
    query_refs:
      - "SALIDB_LINKAGE_CHECKS[2]"

  - id: salidb-documentreference-voting
    name: "SaliDBDocumentReference -> Voting"
    category: SaliDB Linkage
    description: Document references with voting_id should reference an existing voting
    query_refs:
      - "SALIDB_LINKAGE_CHECKS[3]"

  - id: salidb-documentreference-section
    name: "SaliDBDocumentReference -> Section"
    category: SaliDB Linkage
    description: Document references with section_key should reference an existing section
    query_refs:
      - "SALIDB_LINKAGE_CHECKS[4]"

  - id: salidb-documentreference-tunnus-format
    name: SaliDBDocumentReference tunnus format
    category: SaliDB Linkage
    description: "Document references should have a basic tunnus format (e.g., HE 1/2024 vp)"
    query_refs:
      - "SALIDB_LINKAGE_CHECKS[5]"
